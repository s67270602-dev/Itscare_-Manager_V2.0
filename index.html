<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정기 위생관리 계약 관리</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN (빠른 프로토타입용) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: "Noto Sans KR", sans-serif;
      }
      /* Custom scrollbar for better UX */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #aaa;
      }
      @media print {
        .no-print {
          display: none !important;
        }
        .print-only {
          display: block !important;
        }
        body {
          background: white;
          margin: 0;
          padding: 0;
        }
        .page-break {
          page-break-after: always;
        }
      }
    </style>

    <!-- ⚠️ importmap은 "모듈 스크립트보다 먼저" 있어야 합니다 -->
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jsonwebtoken": "https://esm.sh/jsonwebtoken@^9.0.3",
    "cookie": "https://esm.sh/cookie@^1.1.1",
    "resend": "https://esm.sh/resend@^6.8.0"
  }
}
</script>
  </head>

  <body class="bg-gray-50 text-slate-800">
    <noscript>이 페이지는 JavaScript가 필요합니다.</noscript>
    <div id="root"></div>

    <!-- ✅ 핵심: React 앱 엔트리 로드 (현재 레포에 index.tsx가 "루트"에 있으니 이렇게) -->
    <script type="module" src="/index.tsx"></script>

    <!--
      만약 React 엔트리가 /src/main.tsx 이라면 위 한 줄을 아래처럼 바꾸세요:
      <script type="module" src="/src/main.tsx"></script>
    -->
  </body>
</html>
